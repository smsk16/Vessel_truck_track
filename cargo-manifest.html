<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Cargo Manifest</title><style>
:root{--navy:#11324d;--blue:#1f6b99;--mist:#eef4f7;--line:#c9d7df;--ink:#1e2932;--muted:#60717d}*{box-sizing:border-box}body{margin:0;background:#f5f8fa;color:var(--ink);font:15px/1.4 Arial,sans-serif}header{background:linear-gradient(120deg,var(--navy),#195b80);color:#fff;padding:30px 24px}header div,main{max-width:1200px;margin:auto}h1{margin:0 0 4px;font-size:28px}header p{margin:0;opacity:.86}main{padding:26px 24px 46px}[hidden]{display:none!important}.topline,.formhead{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}.topline h2,.formhead h2{font-size:22px;margin:0 0 5px}.notice{color:var(--muted);margin:0}.tablebox,form{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 3px 16px #11324d12}table{border-collapse:collapse;width:100%;min-width:900px}th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#47606f;background:var(--mist)}th,td{padding:13px 14px;border-bottom:1px solid #dce5ea;vertical-align:middle}tbody tr:last-child td{border-bottom:0}small{color:var(--muted)}button{border:0;border-radius:5px;padding:10px 15px;cursor:pointer;font-weight:700;font-size:14px}.primary{background:var(--navy);color:#fff}.secondary{background:#fff;border:1px solid #9fb1bd;color:#314956}.link{border:0;background:none;color:#0e5d88;padding:3px 6px}.delete{color:#b42318}.tag{display:inline-block;padding:3px 8px;border-radius:99px;background:#e3f1e9;color:#25633f;font-size:12px;font-weight:700}.empty{text-align:center;color:var(--muted);padding:34px}.row-actions{white-space:nowrap}.detail{margin-top:22px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px}.detail h3{color:var(--navy);margin:0 0 7px}.detail p{margin:0 0 16px;color:var(--muted)}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:#e8f1f5;border-radius:4px;padding:6px 9px;font-size:13px;font-weight:700}section{padding:22px 24px;border-bottom:1px solid var(--line)}section:last-of-type{border:0}h3{color:var(--navy);font-size:18px;margin:0 0 17px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px 18px}.wide{grid-column:span 2}.full{grid-column:1/-1}label{display:block;font-weight:700;font-size:13px;color:#334955}label span{color:#b42318}input,select,textarea{width:100%;margin-top:6px;padding:10px 11px;border:1px solid #aebfc9;border-radius:5px;background:#fff;color:var(--ink);font:inherit}textarea{min-height:72px;resize:vertical}.actions{display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:18px 24px;background:var(--mist)}#message{margin-right:auto;color:#276644;font-weight:700}@media(max-width:760px){main{padding:20px 14px}.topline,.formhead{display:block}.topline button,.formhead button{margin-top:12px}.grid{grid-template-columns:1fr}.wide,.full{grid-column:auto}section{padding:20px 16px}}
</style></head><body><header><div><h1>Cargo Manifest</h1><p>Upload and maintain container cargo manifests for vessel arrivals.</p></div></header><main>
<div id="list"><div class="topline"><div><h2>Manifest records</h2><p class="notice" id="count"></p></div><button class="primary" id="create" type="button">+ Upload manifest</button></div><div class="tablebox"><table><thead><tr><th>Manifest number</th><th>Vessel</th><th>Port of discharge</th><th>Containers</th><th>Arrival date</th><th>Attachment</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div><div class="detail" id="detail" hidden></div></div>
<div id="editor" hidden><div class="formhead"><div><h2 id="title">Upload cargo manifest</h2><p class="notice">Fields marked <strong>*</strong> are required.</p></div><button class="secondary" id="back" type="button">← Back to records</button></div><form id="form"><section><h3>1. Manifest file and voyage</h3><div class="grid"><label>Manifest number <span>*</span><input name="manifestNo" placeholder="MAN-CHN-0001" required></label><label>Manifest file<input name="file" type="file" accept=".pdf,.csv,.xlsx,.xml"></label><label>Vessel <span>*</span><select name="vessel" id="vessel" required></select></label><label>Port of loading<input name="loadingPort" value="Singapore"></label><label>Port of discharge <span>*</span><select name="dischargePort" required><option>Chennai Port, India</option><option>Jawaharlal Nehru Port, India</option><option>Mundra Port, India</option><option>Cochin Port, India</option></select></label><label>Expected arrival <span>*</span><input name="arrival" type="date" required></label></div></section><section><h3>2. Cargo and containers</h3><div class="grid"><label>Commodity<input name="commodity" placeholder="e.g. Consumer goods"></label><label>Bill of lading reference<input name="blNo"></label><label>Container count<input name="containerCount" type="number" min="1" readonly></label><label class="full">Container numbers <span>*</span><textarea name="containers" id="containers" required placeholder="Enter comma-separated container numbers, or use Add 20 from Container Master."></textarea></label><div class="full"><button type="button" class="secondary" id="addTwenty">Add 20 from Container Master</button></div><label class="full">Notes<textarea name="notes" placeholder="Add manifest notes or upload remarks."></textarea></label></div></section><div class="actions"><span id="message"></span><button type="reset" class="secondary">Clear form</button><button type="submit" class="primary">Save manifest</button></div></form></div>
</main><script>
const manifestLibrary=document.createElement('section');manifestLibrary.id='sampleLibrary';manifestLibrary.style.cssText='max-width:1200px;margin:0 auto 28px;background:#fff;border:1px solid #c9d7df;border-radius:10px;padding:20px 24px;box-shadow:0 3px 16px #11324d12';manifestLibrary.innerHTML='<h3>Sample manifest documents</h3><p class="notice">Open the uploaded Excel source files for the five sample vessel manifests.</p><div class="chips">'+[['MAN-CHN-0001','FLAG LAMA'],['MAN-CHN-0002','FLAGSHIP'],['MAN-CHN-0003','COSCO SHIPPING SOLAR'],['MAN-CHN-0004','MSC ALBA F'],['MAN-CHN-0005','MORNING SUN']].map((x,i)=>`<a class="chip" href="man-chn-000${i+1}-sample-manifest.xlsx" target="_blank" rel="noopener">${x[0]} — ${x[1]}</a>`).join('')+'</div>';document.getElementById('list').insertAdjacentElement('afterend',manifestLibrary);
</script><script>
const manifestStore='cargoManifestRecordsV1';if(!(JSON.parse(localStorage.getItem(manifestStore)||'[]')).length){const demoVessels=['FLAG LAMA','FLAGSHIP','COSCO SHIPPING SOLAR','MSC ALBA F','MORNING SUN'].map((v,i)=>({vesselName:v,imo:String(9474711+i)}));const demoContainers=Array.from({length:100},(_,i)=>({containerNo:`MSKU${String(100000+i).padStart(6,'0')}`}));localStorage.setItem('vesselMasterRecords',JSON.stringify(JSON.parse(localStorage.getItem('vesselMasterRecords')||'[]').length?JSON.parse(localStorage.getItem('vesselMasterRecords')):demoVessels));localStorage.setItem('containerMasterRecordsV1',JSON.stringify(JSON.parse(localStorage.getItem('containerMasterRecordsV1')||'[]').length?JSON.parse(localStorage.getItem('containerMasterRecordsV1')):demoContainers));localStorage.removeItem('cargoManifestSamplesV1')}
</script><script>
const form=document.getElementById('form'),key='cargoManifestRecordsV1',seed='cargoManifestSamplesV1',rows=document.getElementById('rows'),list=document.getElementById('list'),editor=document.getElementById('editor'),detail=document.getElementById('detail'),message=document.getElementById('message'),vesselSelect=document.getElementById('vessel'),containers=document.getElementById('containers'),containerCount=form.elements.containerCount;let records=JSON.parse(localStorage.getItem(key)||'[]'),edit=null;const esc=v=>String(v||'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const save=()=>localStorage.setItem(key,JSON.stringify(records));const vesselData=()=>JSON.parse(localStorage.getItem('vesselMasterRecords')||'[]');const containerData=()=>JSON.parse(localStorage.getItem('containerMasterRecordsV1')||'[]');function numbers(text){return [...new Set(text.split(/[\s,;\n]+/).map(x=>x.trim()).filter(Boolean))]}function setCount(){containerCount.value=numbers(containers.value).length}function loadVessels(){const vessels=vesselData();vesselSelect.innerHTML='<option value="">Select vessel</option>'+vessels.map(v=>`<option value="${esc(v.vesselName)}">${esc(v.vesselName)}${v.imo?' (IMO '+esc(v.imo)+')':''}</option>`).join('')}function render(){document.getElementById('count').textContent=`${records.length} cargo manifest records`;rows.innerHTML=records.map(r=>`<tr><td><strong>${esc(r.manifestNo)}</strong><br><small>${esc(r.blNo)}</small></td><td>${esc(r.vessel)}</td><td>${esc(r.dischargePort)}</td><td>${numbers(r.containers).length}</td><td>${esc(r.arrival)}</td><td><small>${esc(r.fileName||'No attachment')}</small></td><td class="row-actions"><button type="button" class="link" data-view="${r.id}">View</button><button type="button" class="link" data-edit="${r.id}">Modify</button><button type="button" class="link delete" data-delete="${r.id}">Delete</button></td></tr>`).join('')||'<tr><td class="empty" colspan="7">No manifest records yet.</td></tr>'}function showDetail(r){detail.hidden=false;detail.innerHTML=`<h3>${esc(r.manifestNo)} — ${esc(r.vessel)}</h3><p>${esc(r.commodity||'Cargo details not supplied')} · ${numbers(r.containers).length} containers · ${esc(r.dischargePort)}</p><div class="chips">${numbers(r.containers).map(n=>`<span class="chip">${esc(n)}</span>`).join('')}</div>`;detail.scrollIntoView({behavior:'smooth',block:'nearest'})}function showForm(r){form.reset();loadVessels();edit=r?.id||null;document.getElementById('title').textContent=r?'Modify cargo manifest':'Upload cargo manifest';if(r)Object.entries(r).forEach(([k,v])=>{if(form.elements[k]&&k!=='fileName')form.elements[k].value=v});setCount();list.hidden=true;editor.hidden=false;scrollTo(0,0)}function showList(){editor.hidden=true;list.hidden=false;message.textContent='';render()}document.getElementById('create').onclick=()=>showForm();document.getElementById('back').onclick=showList;containers.oninput=setCount;document.getElementById('addTwenty').onclick=()=>{const all=containerData(),used=new Set(records.flatMap(r=>numbers(r.containers))),available=all.filter(c=>!used.has(c.containerNo)).slice(0,20);containers.value=available.map(c=>c.containerNo).join(', ');setCount();message.textContent=available.length===20?'20 containers added from Container Master.':'Fewer than 20 unassigned containers are available.'};rows.onclick=e=>{let id=e.target.dataset.view||e.target.dataset.edit||e.target.dataset.delete;if(!id)return;let r=records.find(x=>x.id===id);if(e.target.dataset.view)showDetail(r);else if(e.target.dataset.edit)showForm(r);else if(confirm(`Delete ${r.manifestNo}? This cannot be undone.`)){records=records.filter(x=>x.id!==id);save();render()}};form.onsubmit=e=>{e.preventDefault();setCount();if(!form.reportValidity())return;let f={...Object.fromEntries(new FormData(form)),fileName:form.elements.file.files[0]?.name||'',id:edit||crypto.randomUUID()};records=edit?records.map(x=>x.id===edit?f:x):[...records,f];save();showList()};if(!localStorage.getItem(seed)){const vessels=vesselData(),all=containerData();if(vessels.length&&all.length>=100){records=[...records,...Array.from({length:5},(_,i)=>({id:'sample-manifest-'+i,manifestNo:'MAN-CHN-'+String(i+1).padStart(4,'0'),vessel:vessels[i%vessels.length].vesselName,loadingPort:'Singapore',dischargePort:'Chennai Port, India',arrival:`2026-07-${String(20+i).padStart(2,'0')}`,commodity:['Consumer goods','Textiles','Auto parts','Electronics','Food-grade cargo'][i],blNo:'BL-2026-'+String(7001+i),containers:all.slice(i*20,i*20+20).map(c=>c.containerNo).join(', '),fileName:'sample-manifest-'+(i+1)+'.pdf',notes:'Preloaded Chennai cargo manifest.'}))];save()}localStorage.setItem(seed,'true')}render();
</script></body></html>
