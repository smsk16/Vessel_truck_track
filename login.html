<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login | Logistics Control Centre</title><style>
:root{--navy:#11324d;--blue:#1f6b99;--line:#c9d7df;--ink:#1e2932}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;background:linear-gradient(135deg,#11324d,#1f6b99);font:16px Arial,sans-serif;color:var(--ink)}main{width:min(420px,calc(100% - 32px));background:#fff;border-radius:14px;padding:38px;box-shadow:0 16px 45px #071d2d66}.mark{font-size:32px;margin-bottom:15px}h1{color:var(--navy);font-size:27px;margin:0 0 8px}p{color:#617480;margin:0 0 25px;line-height:1.45}label{display:block;color:#344b58;font-weight:700;font-size:13px;margin-top:16px}input{width:100%;padding:12px;margin-top:6px;border:1px solid var(--line);border-radius:6px;font:inherit}input:focus{outline:3px solid #d7edf8;border-color:var(--blue)}button{width:100%;margin-top:24px;border:0;border-radius:6px;padding:12px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;cursor:pointer}button:hover{background:var(--blue)}#error{min-height:18px;color:#b42318;font-size:13px;margin-top:12px}.foot{margin-top:25px;font-size:12px;color:#768894;text-align:center}
</style></head><body><main><div class="mark">⚓</div><h1>Logistics Control Centre</h1><p>Sign in to access vessel, container, cargo-manifest, and truck tracking operations.</p><form id="login"><label for="userId">User ID</label><input id="userId" name="userId" autocomplete="username" required autofocus><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required><button type="submit">Sign in</button><div id="error" role="alert"></div></form><div class="foot">Prototype login — credentials are validated locally in this browser.</div></main><script>document.getElementById('login').addEventListener('submit',e=>{e.preventDefault();const id=document.getElementById('userId').value.trim(),password=document.getElementById('password').value;if(!id||!password){document.getElementById('error').textContent='Enter both user ID and password.';return}localStorage.setItem('lccAuthenticated','true');localStorage.setItem('lccUser',id);location.href='index.html'});</script></body></html>
