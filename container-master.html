<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Container Master</title><style>
:root{--navy:#11324d;--blue:#1f6b99;--mist:#eef4f7;--line:#c9d7df;--ink:#1e2932;--muted:#60717d}*{box-sizing:border-box}body{margin:0;background:#f5f8fa;color:var(--ink);font:15px/1.4 Arial,sans-serif}header{background:linear-gradient(120deg,var(--navy),#195b80);color:#fff;padding:30px 24px}header div,main{max-width:1200px;margin:auto}h1{margin:0 0 4px;font-size:28px}header p{margin:0;opacity:.86}main{padding:26px 24px 46px}[hidden]{display:none!important}.topline,.formhead{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}.topline h2,.formhead h2{font-size:22px;margin:0 0 5px}.notice{color:var(--muted);margin:0}.tablebox,form{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 3px 16px #11324d12}table{border-collapse:collapse;width:100%;min-width:990px}th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#47606f;background:var(--mist)}th,td{padding:12px 14px;border-bottom:1px solid #dce5ea;vertical-align:middle}tbody tr:last-child td{border-bottom:0}small{color:var(--muted)}button{border:0;border-radius:5px;padding:10px 15px;cursor:pointer;font-weight:700;font-size:14px}.primary{background:var(--navy);color:#fff}.secondary{background:#fff;border:1px solid #9fb1bd;color:#314956}.link{border:0;background:none;color:#0e5d88;padding:3px 6px}.delete{color:#b42318}.tag{display:inline-block;padding:3px 8px;border-radius:99px;background:#e3f1e9;color:#25633f;font-size:12px;font-weight:700}.transit{background:#e6f1fb;color:#195a87}.hold{background:#fff1d6;color:#8a5c00}.empty{text-align:center;color:var(--muted);padding:34px}.row-actions{white-space:nowrap}section{padding:22px 24px;border-bottom:1px solid var(--line)}section:last-of-type{border:0}h3{color:var(--navy);font-size:18px;margin:0 0 17px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px 18px}.full{grid-column:1/-1}label{display:block;font-weight:700;font-size:13px;color:#334955}label span{color:#b42318}input,select,textarea{width:100%;margin-top:6px;padding:10px 11px;border:1px solid #aebfc9;border-radius:5px;background:#fff;color:var(--ink);font:inherit}textarea{min-height:72px;resize:vertical}.actions{display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:18px 24px;background:var(--mist)}#message{margin-right:auto;color:#276644;font-weight:700}@media(max-width:760px){main{padding:20px 14px}.topline,.formhead{display:block}.topline button,.formhead button{margin-top:12px}.grid{grid-template-columns:1fr}.full{grid-column:auto}section{padding:20px 16px}}
</style></head><body>
<header><div><h1>Container Master</h1><p>Maintain container identification, equipment, ownership, and logistics status.</p></div></header><main>
<div id="list"><div class="topline"><div><h2>Container records</h2><p class="notice" id="count"></p></div><button class="primary" id="create" type="button">+ Create container</button></div><div class="tablebox"><table><thead><tr><th>Container number</th><th>Equipment</th><th>Owner</th><th>Status</th><th>Last location</th><th>Updated</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></div>
<div id="editor" hidden><div class="formhead"><div><h2 id="title">Create container</h2><p class="notice">Fields marked <strong>*</strong> are required.</p></div><button class="secondary" id="back" type="button">← Back to records</button></div><form id="form"><section><h3>1. Container identification</h3><div class="grid"><label>Container number <span>*</span><input name="containerNo" placeholder="ABCD1234567" pattern="[A-Z]{4}[0-9]{7}" title="Use 4 letters followed by 7 digits" required></label><label>ISO size/type <span>*</span><select name="equipment" required><option value="">Select equipment</option><option>20GP</option><option>40GP</option><option>40HC</option><option>20RF</option><option>40RH</option><option>20OT</option></select></label><label>Container owner <span>*</span><input name="owner" required></label><label>Manufacture year<input type="number" name="manufactureYear" min="1950" max="2100"></label><label>Max gross weight (kg)<input type="number" name="maxWeight" min="0"></label><label>Tare weight (kg)<input type="number" name="tareWeight" min="0"></label></div></section><section><h3>2. Current logistics status</h3><div class="grid"><label>Status <span>*</span><select name="status" required><option value="">Select status</option><option>At port</option><option>In transit</option><option>Empty available</option><option>Under maintenance</option><option>Customs hold</option></select></label><label>Last location <span>*</span><input name="location" required></label><label>Last updated<input name="updated" type="datetime-local"></label><label>Assigned vessel / truck<input name="assignedTo"></label><label>Commodity<input name="commodity"></label><label>Seal number<input name="sealNo"></label><label class="full">Notes<textarea name="notes" placeholder="Add condition, damage, or operational notes."></textarea></label></div></section><div class="actions"><span id="message"></span><button type="reset" class="secondary">Clear form</button><button type="submit" class="primary">Save record</button></div></form></div>
</main><script>
const form=document.getElementById('form'),key='containerMasterRecordsV1',seed='containerMasterSampleV1',rows=document.getElementById('rows'),list=document.getElementById('list'),editor=document.getElementById('editor'),message=document.getElementById('message');let records=JSON.parse(localStorage.getItem(key)||'[]'),edit=null;const owners=['MAERSK','MSC','CMA CGM','HAPAG-LLOYD','ONE','EVERGREEN','COSCO','PIL'],ports=['JNPA, India','Mundra, India','Chennai, India','Cochin, India','Singapore','Colombo, Sri Lanka','Dubai, UAE','Visakhapatnam, India'],goods=['General cargo','Textiles','Auto parts','Electronics','Food-grade cargo','Empty'];const esc=v=>String(v||'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const save=()=>localStorage.setItem(key,JSON.stringify(records));function check(prefix,serial){let sum=0;const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ',s=prefix+String(serial).padStart(6,'0');for(let i=0;i<10;i++){let n=i<4?chars.indexOf(s[i])+10:Number(s[i]);if(i<4)n+=Math.floor((n-10)/10)*2;sum+=n*(1<<i)}return (sum%11)%10}function samples(){return Array.from({length:200},(_,i)=>{const prefix=['MSCU','MAEU','CMAU','HLCU','ONEY','EGLV','COSU','PILU'][i%8],serial=100000+i*37,number=prefix+String(serial).padStart(6,'0')+check(prefix,serial),status=['At port','In transit','Empty available','Under maintenance','Customs hold'][i%5];return{id:'sample-'+number,containerNo:number,equipment:['20GP','40GP','40HC','20RF','40RH'][i%5],owner:owners[i%owners.length],manufactureYear:2016+i%10,maxWeight:30480,tareWeight:i%5===0?3000:3800,status,location:ports[i%ports.length],updated:new Date(Date.now()-i*3600000).toISOString().slice(0,16),assignedTo:status==='In transit'?'TRK-'+(7000+i):'',commodity:goods[i%goods.length],sealNo:'SL'+String(500000+i),notes:'Operational sample record.'}})}function render(){document.getElementById('count').textContent=`${records.length} container records`;rows.innerHTML=records.map(r=>{let cls=r.status==='In transit'?'transit':r.status==='Customs hold'||r.status==='Under maintenance'?'hold':'';return `<tr><td><strong>${esc(r.containerNo)}</strong><br><small>${esc(r.sealNo)}</small></td><td>${esc(r.equipment)}</td><td>${esc(r.owner)}</td><td><span class="tag ${cls}">${esc(r.status)}</span></td><td>${esc(r.location)}</td><td><small>${r.updated?new Date(r.updated).toLocaleString():'—'}</small></td><td class="row-actions"><button type="button" class="link" data-edit="${r.id}">Modify</button><button type="button" class="link delete" data-delete="${r.id}">Delete</button></td></tr>`}).join('')||'<tr><td class="empty" colspan="7">No container records yet.</td></tr>'}function showForm(r){form.reset();edit=r?.id||null;document.getElementById('title').textContent=r?'Modify container':'Create container';if(r)Object.entries(r).forEach(([k,v])=>{if(form.elements[k])form.elements[k].value=v});list.hidden=true;editor.hidden=false;scrollTo(0,0)}function showList(){editor.hidden=true;list.hidden=false;message.textContent='';render()}document.getElementById('create').onclick=()=>showForm();document.getElementById('back').onclick=showList;rows.onclick=e=>{const id=e.target.dataset.edit||e.target.dataset.delete;if(!id)return;const r=records.find(x=>x.id===id);if(e.target.dataset.edit)showForm(r);else if(confirm(`Delete ${r.containerNo}? This cannot be undone.`)){records=records.filter(x=>x.id!==id);save();render()}};form.onsubmit=e=>{e.preventDefault();if(!form.reportValidity())return;let r={...Object.fromEntries(new FormData(form)),id:edit||crypto.randomUUID()};records=edit?records.map(x=>x.id===edit?r:x):[...records,r];save();showList()};if(!localStorage.getItem(seed)){records=[...records,...samples().filter(s=>!records.some(r=>r.containerNo===s.containerNo))];save();localStorage.setItem(seed,'true')}render();
</script></body></html>
