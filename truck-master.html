<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Truck Master</title><style>
:root{--n:#11324d;--b:#1f6b99;--m:#eef4f7;--l:#c9d7df;--i:#1e2932;--u:#60717d}*{box-sizing:border-box}body{margin:0;background:#f5f8fa;color:var(--i);font:15px Arial,sans-serif}header{background:linear-gradient(120deg,var(--n),#195b80);color:#fff;padding:30px 24px}header div,main{max-width:1120px;margin:auto}h1{margin:0 0 5px}header p{margin:0;opacity:.85}main{padding:26px 24px 46px}[hidden]{display:none!important}.top,.fh{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}.top h2,.fh h2{margin:0;font-size:22px}.box,form{background:#fff;border:1px solid var(--l);border-radius:10px;overflow-x:auto;box-shadow:0 3px 16px #11324d12}table{border-collapse:collapse;width:100%;min-width:850px}th{text-align:left;background:var(--m);font-size:12px;text-transform:uppercase;color:#47606f}th,td{padding:13px 14px;border-bottom:1px solid #dce5ea}button{border:0;border-radius:5px;padding:10px 15px;font-weight:700;cursor:pointer}.primary{background:var(--n);color:#fff}.secondary{background:#fff;color:#314956;border:1px solid #9fb1bd}.link{border:0;background:none;color:#0e5d88;padding:3px 6px}.del{color:#b42318}.tag{background:#e3f1e9;color:#25633f;border-radius:99px;padding:3px 8px;font-size:12px;font-weight:bold}.empty{text-align:center;color:var(--u);padding:32px}section{padding:22px 24px;border-bottom:1px solid var(--l)}h3{margin:0 0 17px;color:var(--n)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px 18px}.full{grid-column:1/-1}label{font-weight:bold;font-size:13px;color:#334955}label span{color:#b42318}input,select,textarea{display:block;width:100%;margin-top:6px;padding:10px;border:1px solid #aebfc9;border-radius:5px;font:inherit}textarea{min-height:70px}.actions{padding:18px 24px;background:var(--m);display:flex;justify-content:flex-end;gap:12px}small{color:var(--u)}@media(max-width:700px){main{padding:20px 14px}.top,.fh{display:block}.top button,.fh button{margin-top:12px}.grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style></head><body><header><div><h1>Truck Master</h1><p>Maintain fleet identity, vehicle, driver, and operational status.</p></div></header><main><div id="list"><div class="top"><h2>Truck records</h2><button class="primary" id="create">+ Create truck</button></div><div class="box"><table><thead><tr><th>Registration</th><th>Vehicle type</th><th>Carrier</th><th>Driver</th><th>Status</th><th>Last location</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></div><div id="edit" hidden><div class="fh"><h2 id="title">Create truck</h2><button class="secondary" id="back">← Back to records</button></div><form id="form"><section><h3>1. Vehicle details</h3><div class="grid"><label>Registration number <span>*</span><input name="registration" placeholder="TN 01 AB 1234" required></label><label>Fleet ID <span>*</span><input name="fleetId" required></label><label>Vehicle type <span>*</span><select name="vehicleType" required><option value="">Select</option><option>Container trailer</option><option>Flatbed</option><option>Refrigerated truck</option><option>Tanker</option><option>Box truck</option></select></label><label>Carrier <span>*</span><input name="carrier" required></label><label>Capacity (tonnes)<input name="capacity" type="number" min="0" step="0.1"></label><label>GPS device ID<input name="gpsId"></label></div></section><section><h3>2. Operations</h3><div class="grid"><label>Driver name<input name="driver"></label><label>Driver phone<input name="phone"></label><label>Status <span>*</span><select name="status" required><option>Available</option><option>On trip</option><option>At terminal</option><option>Maintenance</option></select></label><label class="full">Last location<input name="location"></label></div></section><div class="actions"><button type="reset" class="secondary">Clear form</button><button type="submit" class="primary">Save truck</button></div></form></div></main><script>
const key='truckMasterRecordsV1',seed='truckMasterSeedV1',form=document.getElementById('form'),rows=document.getElementById('rows');let records=JSON.parse(localStorage.getItem(key)||'[]'),editing=null;const esc=v=>String(v||'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const save=()=>localStorage.setItem(key,JSON.stringify(records));const cities=['Chennai Container Terminal','Chennai, Tamil Nadu','Sriperumbudur, Tamil Nadu','Mundra Port, Gujarat','Bengaluru, Karnataka','Hyderabad, Telangana'];const carriers=['Blue Dart Logistics','Southern Freight','Coastal Haulage','TransIndia Fleet','PortLink Transport'];function render(){rows.innerHTML=records.map(r=>`<tr><td><strong>${esc(r.registration)}</strong><br><small>${esc(r.fleetId)}</small></td><td>${esc(r.vehicleType)}</td><td>${esc(r.carrier)}</td><td>${esc(r.driver)}</td><td><span class="tag">${esc(r.status)}</span></td><td>${esc(r.location)}</td><td><button class="link" data-e="${r.id}">Modify</button><button class="link del" data-d="${r.id}">Delete</button></td></tr>`).join('')||'<tr><td colspan="7" class="empty">No truck records.</td></tr>'}function show(r){form.reset();editing=r?.id||null;document.getElementById('title').textContent=r?'Modify truck':'Create truck';if(r)Object.entries(r).forEach(([k,v])=>{if(form.elements[k])form.elements[k].value=v});document.getElementById('list').hidden=true;document.getElementById('edit').hidden=false}function close(){document.getElementById('edit').hidden=true;document.getElementById('list').hidden=false;render()}document.getElementById('create').onclick=()=>show();document.getElementById('back').onclick=close;rows.onclick=e=>{let id=e.target.dataset.e||e.target.dataset.d;if(!id)return;let r=records.find(x=>x.id===id);if(e.target.dataset.e)show(r);else if(confirm(`Delete ${r.registration}?`)){records=records.filter(x=>x.id!==id);save();render()}};form.onsubmit=e=>{e.preventDefault();if(!form.reportValidity())return;let r={...Object.fromEntries(new FormData(form)),id:editing||crypto.randomUUID()};records=editing?records.map(x=>x.id===editing?r:x):[...records,r];save();close()};if(!localStorage.getItem(seed)){records=Array.from({length:200},(_,i)=>{let n=1000+i;return{id:'sample-'+i,registration:`TN ${String(i%35+1).padStart(2,'0')} ${['AB','CD','EF','GH'][i%4]} ${n}`,fleetId:`TRK-${String(i+1).padStart(3,'0')}`,vehicleType:['Container trailer','Flatbed','Refrigerated truck','Tanker','Box truck'][i%5],carrier:carriers[i%carriers.length],capacity:[28,32,18,25,12][i%5],gpsId:`GPS-${70000+i}`,driver:`Driver ${String(i+1).padStart(3,'0')}`,phone:`+91 9${String(100000000+i).slice(-9)}`,status:['Available','On trip','At terminal','Maintenance'][i%4],location:cities[i%cities.length]}});save();localStorage.setItem(seed,'true')}render();
</script></body></html>
