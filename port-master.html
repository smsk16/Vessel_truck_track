<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Port Master</title>
  <style>
    :root{--navy:#11324d;--blue:#1f6b99;--mist:#eef4f7;--line:#c9d7df;--ink:#1e2932;--muted:#60717d}*{box-sizing:border-box}body{margin:0;background:#f5f8fa;color:var(--ink);font:15px/1.4 Arial,sans-serif}header{background:linear-gradient(120deg,var(--navy),#195b80);color:#fff;padding:32px 24px}header div,main{max-width:1120px;margin:auto}h1{margin:0 0 5px;font-size:28px}header p{margin:0;opacity:.86}main{padding:26px 24px 46px}[hidden]{display:none!important}.list-header,.form-header{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}.list-header h2,.form-header h2{font-size:22px;margin:0 0 5px}.notice{color:var(--muted);margin:0}.table-wrap,form{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 3px 16px #11324d12}table{border-collapse:collapse;width:100%;min-width:750px}th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#47606f;background:var(--mist)}th,td{padding:14px 16px;border-bottom:1px solid #dce5ea;vertical-align:middle}tbody tr:last-child td{border-bottom:0}small{color:var(--muted)}.status{display:inline-block;padding:3px 8px;border-radius:99px;background:#e3f1e9;color:#25633f;font-size:12px;font-weight:700}.row-actions{white-space:nowrap}.link-button{border:0;background:none;color:#0e5d88;cursor:pointer;font-weight:700;padding:4px 7px}.delete{color:#b42318}.empty{color:var(--muted);text-align:center;padding:34px}button{border:0;border-radius:5px;padding:11px 17px;cursor:pointer;font-weight:700;font-size:14px}.primary{background:var(--navy);color:#fff}.secondary{background:#fff;border:1px solid #9fb1bd;color:#314956}section{padding:22px 24px;border-bottom:1px solid var(--line)}section:last-of-type{border:0}h3{color:var(--navy);font-size:18px;margin:0 0 17px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px 18px}.wide{grid-column:span 2}.full{grid-column:1/-1}label{display:block;font-weight:700;font-size:13px;color:#334955}label span{color:#b42318}input,select,textarea{width:100%;margin-top:6px;padding:10px 11px;border:1px solid #aebfc9;border-radius:5px;background:#fff;color:var(--ink);font:inherit}input:focus,select:focus,textarea:focus{outline:3px solid #d7edf8;border-color:var(--blue)}textarea{min-height:74px;resize:vertical}.actions{display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:18px 24px;background:var(--mist)}#message{margin-right:auto;color:#276644;font-weight:700}@media(max-width:760px){.grid{grid-template-columns:1fr}.wide,.full{grid-column:auto}header{padding:25px 18px}main{padding:20px 14px 30px}section{padding:20px 16px}.list-header,.form-header{display:block}.list-header button,.form-header button{margin-top:12px}}
  </style>
</head>
<body>
  <header><div><h1>Port Master</h1><p>Maintain Indian port identification, location, classification, and operating details.</p></div></header>
  <main>
    <div id="listView"><div class="list-header"><div><h2>Port records</h2></div><button type="button" class="primary" id="create">+ Create port record</button></div><div class="table-wrap"><table><thead><tr><th>Port</th><th>Code</th><th>State / UT</th><th>Coast</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></div>
    <div id="formView" hidden><div class="form-header"><div><h2 id="formTitle">Create port record</h2><p class="notice">Fields marked <strong>*</strong> are required.</p></div><button type="button" class="secondary" id="back">← Back to records</button></div>
      <form id="portForm">
        <section><h3>1. Port identification</h3><div class="grid"><label>Port name <span>*</span><input name="portName" required></label><label>Port code / UN/LOCODE <span>*</span><input name="portCode" placeholder="e.g. INMAA" required></label><label>Port status <span>*</span><select name="status" required><option value="">Select status</option><option>Active</option><option>Planned</option><option>Inactive</option></select></label><label class="wide">Port authority / operator<input name="authority"></label><label>Year established<input type="number" name="established" min="1800" max="2100"></label></div></section>
        <section><h3>2. Location and classification</h3><div class="grid"><label>State / Union Territory <span>*</span><input name="state" required></label><label>City / district<input name="city"></label><label>Country <span>*</span><input name="country" value="India" required></label><label>Coast <span>*</span><select name="coast" required><option value="">Select coast</option><option>West Coast</option><option>East Coast</option><option>Riverine</option><option>Island</option></select></label><label>Port category <span>*</span><select name="category" required><option value="">Select category</option><option>Major port</option><option>Non-major port</option><option>Private port</option><option>Intermediate port</option></select></label><label>Primary cargo / function<input name="cargo"></label></div></section>
        <section><h3>3. Operational details</h3><div class="grid"><label>Maximum draft (m)<input type="number" name="draft" min="0" step="0.1"></label><label>Berths / terminals<input type="number" name="berths" min="0"></label><label>Annual capacity (MT)<input type="number" name="capacity" min="0" step="0.1"></label><label class="full">Notes<textarea name="notes" placeholder="Add facilities, connectivity, restrictions, or other port information."></textarea></label></div></section>
        <div class="actions"><span id="message" role="status"></span><button type="reset" class="secondary">Clear form</button><button type="submit" class="primary">Save record</button></div>
      </form>
    </div>
  </main>
  <script>
    const form=document.getElementById('portForm'), key='portMasterRecordsV1', seed='portMasterSamplesV1', rows=document.getElementById('rows'), message=document.getElementById('message'), listView=document.getElementById('listView'), formView=document.getElementById('formView');let records=JSON.parse(localStorage.getItem(key)||'[]'),editingId=null;
    const samples=[
      ['Deendayal Port','INKDL','Gujarat','West Coast','Major port','Kandla'],['Jawaharlal Nehru Port','INNSA','Maharashtra','West Coast','Major port','Navi Mumbai'],['Mumbai Port','INBOM','Maharashtra','West Coast','Major port','Mumbai'],['Mormugao Port','INMRM','Goa','West Coast','Major port','Mormugao'],['New Mangalore Port','INNML','Karnataka','West Coast','Major port','Mangaluru'],['Cochin Port','INCOK','Kerala','West Coast','Major port','Kochi'],['V.O. Chidambaranar Port','INTUT','Tamil Nadu','East Coast','Major port','Thoothukudi'],['Chennai Port','INMAA','Tamil Nadu','East Coast','Major port','Chennai'],['Kamarajar Port','INENR','Tamil Nadu','East Coast','Major port','Ennore'],['Visakhapatnam Port','INVTZ','Andhra Pradesh','East Coast','Major port','Visakhapatnam'],['Paradip Port','INPRT','Odisha','East Coast','Major port','Paradip'],['Syama Prasad Mookerjee Port','INCCU','West Bengal','Riverine','Major port','Kolkata'],['Mundra Port','INMUN','Gujarat','West Coast','Private port','Mundra'],['Pipavav Port','INPAV','Gujarat','West Coast','Private port','Rajula'],['Hazira Port','INHZA','Gujarat','West Coast','Private port','Surat'],['Dahej Port','INDAH','Gujarat','West Coast','Non-major port','Bharuch'],['Krishnapatnam Port','INKRI','Andhra Pradesh','East Coast','Private port','Nellore'],['Gangavaram Port','INGGV','Andhra Pradesh','East Coast','Private port','Visakhapatnam'],['Dhamra Port','INDHM','Odisha','East Coast','Private port','Bhadrak'],['Gopalpur Port','INGOP','Odisha','East Coast','Non-major port','Ganjam']
    ].map(([portName,portCode,state,coast,category,city],i)=>({id:`sample-${portCode}`,portName,portCode,state,coast,category,city,country:'India',status:'Active',authority:category==='Major port'?'Port Authority':'Port operator',notes:'Sample Indian port record.'}));
    const esc=v=>String(v||'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const save=()=>localStorage.setItem(key,JSON.stringify(records));
    function render(){rows.innerHTML=records.length?records.map(r=>`<tr><td><strong>${esc(r.portName)}</strong><br><small>${esc(r.city)}</small></td><td>${esc(r.portCode)}</td><td>${esc(r.state)}</td><td>${esc(r.coast)}</td><td>${esc(r.category)}</td><td><span class="status">${esc(r.status)}</span></td><td class="row-actions"><button type="button" class="link-button" data-edit="${r.id}">Modify</button><button type="button" class="link-button delete" data-delete="${r.id}">Delete</button></td></tr>`).join(''):'<tr><td colspan="7" class="empty">No port records yet. Use “Create port record” to add one.</td></tr>'}
    function showForm(r){form.reset();editingId=r?.id||null;document.getElementById('formTitle').textContent=r?'Modify port record':'Create port record';if(r)Object.entries(r).forEach(([k,v])=>{if(form.elements[k])form.elements[k].value=v});listView.hidden=true;formView.hidden=false;scrollTo(0,0)}function showList(){formView.hidden=true;listView.hidden=false;message.textContent='';render()}
    document.getElementById('create').onclick=()=>showForm();document.getElementById('back').onclick=showList;rows.onclick=e=>{const id=e.target.dataset.edit||e.target.dataset.delete;if(!id)return;const record=records.find(r=>r.id===id);if(e.target.dataset.edit)showForm(record);else if(confirm(`Delete ${record.portName}? This cannot be undone.`)){records=records.filter(r=>r.id!==id);save();render()}};form.onreset=()=>message.textContent='Form cleared.';form.onsubmit=e=>{e.preventDefault();if(!form.reportValidity())return;const record={...Object.fromEntries(new FormData(form)),id:editingId||crypto.randomUUID()};records=editingId?records.map(r=>r.id===editingId?record:r):[...records,record];save();showList()};if(!localStorage.getItem(seed)){records=[...records,...samples.filter(s=>!records.some(r=>r.portCode===s.portCode))];save();localStorage.setItem(seed,'true')}render();
  </script>
</body>
</html>
