<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Container Truck Mapping</title><style>:root{--n:#11324d;--m:#eef4f7;--l:#c9d7df;--u:#60717d}*{box-sizing:border-box}body{margin:0;background:#f5f8fa;color:#1e2932;font:15px Arial,sans-serif}header{background:linear-gradient(120deg,var(--n),#195b80);color:#fff;padding:30px 24px}header div,main{max-width:1120px;margin:auto}h1{margin:0 0 5px}header p{margin:0;opacity:.85}main{padding:26px 24px 46px}[hidden]{display:none!important}.top,.fh{display:flex;justify-content:space-between;gap:18px;margin-bottom:18px}.top h2,.fh h2{margin:0;font-size:22px}.box,form{background:#fff;border:1px solid var(--l);border-radius:10px;overflow-x:auto;box-shadow:0 3px 16px #11324d12}table{width:100%;border-collapse:collapse;min-width:780px}th{text-align:left;background:var(--m);font-size:12px;text-transform:uppercase;color:#47606f}th,td{padding:13px 14px;border-bottom:1px solid #dce5ea}button{border:0;border-radius:5px;padding:10px 15px;font-weight:700;cursor:pointer}.primary{background:var(--n);color:#fff}.secondary{background:#fff;color:#314956;border:1px solid #9fb1bd}.link{border:0;background:none;color:#0e5d88;padding:3px 6px}.del{color:#b42318}.tag{background:#e3f1e9;color:#25633f;border-radius:99px;padding:3px 8px;font-size:12px;font-weight:bold}.empty{text-align:center;color:var(--u);padding:32px}section{padding:22px 24px;border-bottom:1px solid var(--l)}h3{margin:0 0 17px;color:var(--n)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px 18px}label{font-weight:bold;font-size:13px;color:#334955}label span{color:#b42318}select,input,textarea{display:block;width:100%;margin-top:6px;padding:10px;border:1px solid #aebfc9;border-radius:5px;font:inherit}textarea{min-height:65px}.actions{padding:18px 24px;background:var(--m);display:flex;justify-content:flex-end;gap:12px}small{color:var(--u)}@media(max-width:700px){main{padding:20px 14px}.top,.fh{display:block}.top button,.fh button{margin-top:12px}.grid{grid-template-columns:1fr}}</style></head><body><header><div><h1>Container–Truck Mapping</h1><p>Assign containers to trucks for port pickup, delivery, and return movements.</p></div></header><main><div id="list"><div class="top"><h2>Container assignments</h2><button class="primary" id="create">+ Create mapping</button></div><div class="box"><table><thead><tr><th>Container number</th><th>Truck registration</th><th>Driver</th><th>Movement</th><th>Assignment status</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></div><div id="edit" hidden><div class="fh"><h2 id="title">Create container mapping</h2><button class="secondary" id="back">← Back to mappings</button></div><form id="form"><section><h3>Assignment details</h3><div class="grid"><label>Container number <span>*</span><select name="containerNo" id="container" required></select></label><label>Truck registration <span>*</span><select name="truck" id="truck" required></select></label><label>Movement type <span>*</span><select name="movement" required><option>Terminal pickup</option><option>Customer delivery</option><option>Empty return</option><option>Inter-terminal transfer</option></select></label><label>Assignment status <span>*</span><select name="status" required><option>Assigned</option><option>Dispatched</option><option>Delivered</option><option>Cancelled</option></select></label><label>Scheduled time<input name="scheduled" type="datetime-local"></label><label>Reference number<input name="reference"></label></div></section><section><h3>Notes</h3><textarea name="notes" placeholder="Add handling or delivery instructions."></textarea></section><div class="actions"><button type="reset" class="secondary">Clear form</button><button type="submit" class="primary">Save mapping</button></div></form></div></main><script>const key='containerTruckMappingsV1',seed='containerTruckSeedV1',form=document.getElementById('form'),rows=document.getElementById('rows');let maps=JSON.parse(localStorage.getItem(key)||'[]'),editing=null;const esc=v=>String(v||'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const save=()=>localStorage.setItem(key,JSON.stringify(maps));const containers=()=>JSON.parse(localStorage.getItem('containerMasterRecordsV1')||'[]');const trucks=()=>JSON.parse(localStorage.getItem('truckMasterRecordsV1')||'[]');function load(){let c=containers(),t=trucks();document.getElementById('container').innerHTML='<option value="">Select container</option>'+c.map(x=>`<option>${esc(x.containerNo)}</option>`).join('');document.getElementById('truck').innerHTML='<option value="">Select truck</option>'+t.map(x=>`<option>${esc(x.registration)}</option>`).join('')}function render(){rows.innerHTML=maps.map(m=>`<tr><td><strong>${esc(m.containerNo)}</strong></td><td>${esc(m.truck)}</td><td>${esc(m.driver)}</td><td>${esc(m.movement)}</td><td><span class="tag">${esc(m.status)}</span></td><td><button class="link" data-e="${m.id}">Modify</button><button class="link del" data-d="${m.id}">Delete</button></td></tr>`).join('')||'<tr><td colspan="6" class="empty">No container–truck mappings yet.</td></tr>'}function show(m){form.reset();load();editing=m?.id||null;document.getElementById('title').textContent=m?'Modify container mapping':'Create container mapping';if(m)Object.entries(m).forEach(([k,v])=>{if(form.elements[k])form.elements[k].value=v});document.getElementById('list').hidden=true;document.getElementById('edit').hidden=false}function close(){document.getElementById('edit').hidden=true;document.getElementById('list').hidden=false;render()}document.getElementById('create').onclick=()=>show();document.getElementById('back').onclick=close;rows.onclick=e=>{let id=e.target.dataset.e||e.target.dataset.d;if(!id)return;let m=maps.find(x=>x.id===id);if(e.target.dataset.e)show(m);else if(confirm(`Delete mapping for ${m.containerNo}?`)){maps=maps.filter(x=>x.id!==id);save();render()}};form.onsubmit=e=>{e.preventDefault();if(!form.reportValidity())return;let truck=trucks().find(t=>t.registration===form.elements.truck.value),m={...Object.fromEntries(new FormData(form)),driver:truck?.driver||'',id:editing||crypto.randomUUID()};maps=editing?maps.map(x=>x.id===editing?m:x):[...maps,m];save();close()};if(!localStorage.getItem(seed)){let c=containers(),t=trucks();if(c.length&&t.length){maps=Array.from({length:Math.min(200,c.length,t.length)},(_,i)=>({id:'sample-'+i,containerNo:c[i].containerNo,truck:t[i].registration,driver:t[i].driver,movement:['Terminal pickup','Customer delivery','Empty return','Inter-terminal transfer'][i%4],status:['Assigned','Dispatched','Delivered'][i%3],scheduled:'2026-07-20T08:00',reference:'MAP-'+String(i+1).padStart(4,'0'),notes:'Sample container–truck assignment.'}));save();localStorage.setItem(seed,'true')}}render();</script></body></html>
